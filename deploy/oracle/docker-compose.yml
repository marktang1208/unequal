# Oracle Cloud 2.0 一键启停编排
#
# 服务：
# - api     : Hono on Node 20（自建容器）
# - pg      : PostgreSQL 16 + pgvector（自建容器）
# - nginx   : 反代 + HTTPS（自建容器，可选）
# - admin   : 静态 admin 后台（Vite build 产物，可选）
#
# 部署模式：彻底迁移（不用 CloudBase）
# 数据迁移：scripts/migrate-nosql-to-pg.ts 一次性从 CloudBase 导到本地 pg
#
# 启动：docker compose up -d
# 停止：docker compose down
# 重启：docker compose restart api
# 日志：docker compose logs -f api

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/oracle/Dockerfile
    image: unequal-api:2.0
    container_name: unequal-api
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      # ONNX 模型文件（如启用 NLI_PROVIDER=onnx）
      - ./nli-assets:/app/nli-assets:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1.5G    # 1 OCPU + 6G 总内存，留 4.5G 给 pg + nginx
        reservations:
          memory: 800M

  pg:
    image: pgvector/pgvector:pg16
    container_name: unequal-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unequal}
      POSTGRES_USER: ${POSTGRES_USER:-unequal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-pg.sql:/docker-entrypoint-initdb.d/init-pg.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # 仅本机，不对外暴露
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unequal} -d ${POSTGRES_DB:-unequal}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    container_name: unequal-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro   # Let's Encrypt 证书
    deploy:
      resources:
        limits:
          memory: 256M

  # 可选：admin 静态后台
  admin:
    image: nginx:1.27-alpine
    container_name: unequal-admin
    restart: unless-stopped
    volumes:
      - ../../apps/admin/dist:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8081:80"   # 仅本机

volumes:
  pgdata:
    driver: local
