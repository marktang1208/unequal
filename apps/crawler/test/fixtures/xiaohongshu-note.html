      <p>宝宝5个月了，最近开始添加辅食。米粉是首选，从稀到稠，从少到多。</p>
      <p>第一口建议是高铁米粉，用温水冲调，搅拌至无颗粒。每天一次，观察3天无过敏反应再加量。</p>
      <p>常见误区：过早加盐、加糖、用奶瓶喂辅食。这些都会增加宝宝肾脏负担或导致龋齿。</p>
      <p>推荐食材：南瓜泥、胡萝卜泥、苹果泥（蒸熟后打泥）。每次只加一种新食材，便于观察过敏。</p>

  </div>
