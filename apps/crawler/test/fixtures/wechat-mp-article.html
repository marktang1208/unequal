    <div id="js_content">
      <p>宝宝发烧38.5度是常见症状，家长不必过度紧张。先观察宝宝精神状态，能吃能玩就不必立即用药。</p>
      <p>3个月以下婴儿发烧应立即就医；3个月以上宝宝腋温超过38.5度且精神不好时，可考虑用布洛芬或对乙酰氨基酚。</p>
      <p>物理降温方法：温水擦浴、退热贴。避免酒精擦浴和冰水浴。</p>
      <p>出现以下情况立即就医：高烧超过3天、抽搐、持续嗜睡、拒绝进食、呼吸急促。</p>
